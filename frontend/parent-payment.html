<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Payment</title>
  <link rel="stylesheet" href="css/parent-payment.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <div class="payment-container">
    <h2>Parent Payment</h2>
    <form id="payment-form">
      <div class="form-group">
        <label for="parent_id">Parent ID</label>
        <input type="text" id="parent_id" name="parent_id" required>
      </div>
      <div class="form-group">
        <label for="parent_name">Parent Name</label>
        <input type="text" id="parent_name" name="parent_name" required>
      </div>
      <div class="form-group">
        <label for="child_name">Child Name</label>
        <input type="text" id="child_name" name="child_name" required>
      </div>
      <div class="form-group">
        <label for="month_name">Month Name</label>
        <input type="text" id="month_name" name="month_name" required>
      </div>
      <div class="form-group">
        <label for="amount">Amount (USD)</label>
        <input type="number" id="amount" name="amount" min="1" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Card Details</label>
        <div id="card-element"></div>
      </div>
      <button type="submit" id="submitBtn">Pay</button>
      <div id="payment-message"></div>
    </form>
  </div>
  <script src="js/parent-payment.js"></script>
</body>
</html>
